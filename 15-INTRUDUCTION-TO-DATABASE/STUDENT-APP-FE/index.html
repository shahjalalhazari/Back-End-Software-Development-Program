<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Student Entry Form</title>

  <!-- Tailwind CSS CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen flex items-center justify-center p-5">

  <!-- Toast Container -->
  <div id="toastContainer" class="fixed top-5 right-5 z-50"></div>

  <div class="bg-white shadow-lg rounded-xl p-8 w-full max-w-lg">
    <h1 class="text-3xl font-bold text-center text-blue-600 mb-6">
      Student Entry Form
    </h1>

    <form id="studentForm" class="space-y-5">
      <!-- Name -->
      <div>
        <label class="block text-gray-700 font-medium mb-2">
          Name
        </label>
        <input
          type="text"
          id="name"
          placeholder="Enter student name"
          class="w-full border border-gray-300 rounded-lg px-4 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500"
        />
      </div>

      <!-- Email -->
      <div>
        <label class="block text-gray-700 font-medium mb-2">
          Email
        </label>
        <input
          type="email"
          id="email"
          placeholder="Enter email"
          class="w-full border border-gray-300 rounded-lg px-4 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500"
        />
      </div>

      <!-- Description -->
      <div>
        <label class="block text-gray-700 font-medium mb-2">
          Description
        </label>
        <textarea
          id="description"
          rows="4"
          placeholder="Enter description"
          class="w-full border border-gray-300 rounded-lg px-4 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500"
        ></textarea>
      </div>

      <!-- Buttons -->
      <div class="flex gap-4">
        <button
          type="submit"
          class="flex-1 bg-blue-600 text-white py-2 rounded-lg hover:bg-blue-700 transition"
        >
          Submit
        </button>

        <button
          type="button"
          id="resetBtn"
          class="flex-1 bg-gray-500 text-white py-2 rounded-lg hover:bg-gray-600 transition"
        >
          Reset
        </button>
      </div>
    </form>
  </div>

  <script>
    const form = document.getElementById("studentForm");
    const resetBtn = document.getElementById("resetBtn");
    const toastContainer = document.getElementById("toastContainer");

    // Show Toast
    function showToast(message, type = "success") {
      const toast = document.createElement("div");

      toast.className = `
        mb-3 px-5 py-3 rounded-lg text-white shadow-lg
        transform transition-all duration-300 translate-x-full
        ${type === "success" ? "bg-green-500" : "bg-red-500"}
      `;

      toast.textContent = message;
      toastContainer.appendChild(toast);

      // Animate in
      setTimeout(() => {
        toast.classList.remove("translate-x-full");
      }, 100);

      // Animate out and remove
      setTimeout(() => {
        toast.classList.add("translate-x-full");

        setTimeout(() => {
          toast.remove();
        }, 300);
      }, 3000);
    }

    // Submit Form
    form.addEventListener("submit", function (e) {
      e.preventDefault();

      const name = document.getElementById("name").value.trim();
      const email = document.getElementById("email").value.trim();
      const description = document
        .getElementById("description")
        .value.trim();

      // Validation
      if (!name || !email || !description) {
        showToast("Please fill in all fields.", "error");
        return;
      }

      // Success
      console.log({
        name,
        email,
        description,
      });


      // SEND DATA TO BACKEND
      fetch("http://localhost:5000/api/students", {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
        },
        body: JSON.stringify({ name, email, description }),
      })
        .then((response) => {
          if (!response.ok) {
            throw new Error("Network response was not ok");
          }
          return response.json();
        })
        .then((data) => {
          console.log("Success:", data);
          showToast("Student information submitted successfully!", "success");
          form.reset();
        })
        .catch((error) => {
          console.error("Error:", error);
          showToast("Failed to submit student information.", "error");
        });

      showToast(
        "Student information submitted successfully!",
        "success"
      );

      form.reset();
    });

    // Reset Form
    resetBtn.addEventListener("click", function () {
      form.reset();
      showToast("Form has been reset.", "success");
    });
  </script>

</body>
</html>
```
